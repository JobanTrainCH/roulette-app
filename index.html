  <style>
     html, body {
  margin: 0;

}
 
    .body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f0f0; margin: 0; font-family: sans-serif; }
    .roulette-container { position: relative; width: 600px; height: 600px;min-width:370px;min-height:370px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.2); border-radius: 50%; overflow: hidden;}
    .svg { width: 100%; height: 100%; transform: rotate(0deg); transition: transform 0.1s linear; border-radius: 50%; }
    .center-button { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 120px; height: 120px; border-radius: 50%; background-color: white; border: 2px solid #ccc; font-size: 14px; z-index: 10; cursor: pointer; }
    .pointer { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid red; z-index: 20; }
    .result-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0, 0, 0, 0.5); display: none; align-items: center; justify-content: center; z-index: 30; }
     .result-board {
        width:96%;
        max-width: 640px;
  border: 5px solid #222;
  border-radius: 20px;
  padding: 40px 50px;
  font-size: 200%;
  font-weight: bold;
  color: #222;
  text-align: center;
  text-shadow: 1px 1px 2px #fff;
  box-shadow:
    0 8px 20px rgba(0, 0, 0, 0.6),
    inset 0 0 10px rgba(255, 255, 255, 0.5);
}
    
  #input-area { max-height: 300px; overflow-y: auto; }
  #history-area { max-height: 200px; overflow-y: auto; }
    .result-overlay.show .result-board { transform: translateY(0); opacity: 1; }
    .settings-button { position: fixed; top: 20px; right: 20px; width: 40px; height: 40px; border-radius: 50%; background: #ddd; border: none; font-size: 20px; z-index: 40; cursor: pointer; }
    .settings-panel { position: fixed; top: 0; right: 0; width: 330px; height: 100vh; background: #fff; box-shadow: -4px 0 10px rgba(0,0,0,0.2); transform: translateX(100%); transition: transform 0.3s ease; padding: 20px; z-index: 35; overflow-y: auto; }
    .settings-panel.show { transform: translateX(0); }
    .input-field { display: flex; align-items: center; margin-bottom: 8px; }
    .input-field input { width: 220px; margin-right: 8px;font-size:16px; }
    .color-box { width: 20px; height: 20px; border: 1px solid #ccc; margin-right: 8px; }
    .input-controls { margin-top: 10px; }
    .history-log { font-size: 14px; margin-top: 10px; white-space: pre-wrap; }
     @media only screen and (max-width: 600px) {
        
.roulette-container {  width: 370px; height: 370px;}
        .center-button{width: 80px; height: 80px;}
     }

<body class="body">
  

   
   <script>
  let bgmAudio = new Audio('se/bgm.mp3');
  bgmAudio.loop = true;
 
  function toggleBGM() {
    const checked = document.getElementById('bgm-toggle').checked;
    if (checked) {
      bgmAudio.play().catch(e => console.warn('BGM play error:', e));
    } else {
      bgmAudio.pause();
      bgmAudio.currentTime = 0;
    }
  }
 
  let seEnabled = false;
  function toggleSE() {
    seEnabled = document.getElementById('se-toggle').checked;
  }
 
let seAudios = [];
let rollAudio = new Audio('https://rimrt.com/roulette/se/roll.mp3');
 
 
function initializeSE() {
  if (seAudios.length > 0) return;
  seAudios = [
    new Audio('https://rimrt.com/roulette/se/01.mp3'),
    new Audio('https://rimrt.com/roulette/se/02.mp3'),
    new Audio('https://rimrt.com/roulette/se/03.mp3'),
    new Audio('https://rimrt.com/roulette/se/04.mp3'),
    new Audio('https://rimrt.com/roulette/se/05.mp3')
  ];
   rollAudio = new Audio('https://rimrt.com/roulette/se/roll.mp3');
}
function autoFill() {

    { label: '物ボケ', color: '#FFB6C1' },

    { label: '食レポ', color: '#D1EEEE' }
  ];

  drawWheel();

function autoFillNumbers() {

    { label: '1', color: '#FFB6C1' },

function autoFillTalk() {
  segments = [
{ label: '最近ハマってること', color: '#F0E68C' },
{ label: '今年中にやりたいこと', color: '#D8BFD8' },
{ label: '小さな自慢話', color: '#E0FFFF' },
{ label: '無言で感情表現', color: '#FFE4E1' },

{ label: '絵文字だけで会話', color: '#E6E6FA' },
{ label: '使っている洗顔料の話', color: '#FFEFD5' }
  ];
  localStorage.setItem('segments', JSON.stringify(segments));
  drawWheel();
  openInputPanel(true);
}
      
 
function playSE() {
  if (!seEnabled) return; // ←ON/OFF切り替えがある場合
  const index = Math.floor(Math.random() * seAudios.length);
  const audio = seAudios[index];

</script>
 
 
  <script>
    let segments = JSON.parse(localStorage.getItem('segments')) || [
      { label: '1駅進む', color: '#FFB6C1' },
      { label: '2駅進む', color: '#B0E0E6' },
      { label: '3駅進む', color: '#FFDAB9' },
      { label: '4駅進む', color: '#E6E6FA' },
      { label: '5駅進む', color: '#C1E1C1' },
      { label: '6駅進む', color: '#FFFACD' },
      { label: '1駅進む', color: '#FADADD' },
      { label: '1本見逃す', color: '#D1EEEE' }
    ];
    let history = JSON.parse(localStorage.getItem('history')) || [];
    const svg = document.getElementById('roulette-svg');
    const centerX = 200;
    const centerY = 200;
    const radius = 190;
    let angle = 0;
    let speed = 0;
    let isSpinning = false;
     
     let autoStopTimer = null;   // 自動ストップ用タイマー
     let isStopping = false;     // 減速中（停止処理中）フラグ
     
    let animationFrame;
    const toggleButton = document.getElementById('toggle-button');
    const resultOverlay = document.getElementById('result-overlay');
    const resultBoard = document.getElementById('result-board');
    function drawWheel() {
      svg.innerHTML = '';
      const anglePerSegment = 360 / segments.length;
      segments.forEach((seg, i) => {
        const startAngle = anglePerSegment * i;
        const endAngle = startAngle + anglePerSegment;
        const largeArc = anglePerSegment > 180 ? 1 : 0;
        const x1 = centerX + radius * Math.cos(Math.PI * startAngle / 180);
        const y1 = centerY + radius * Math.sin(Math.PI * startAngle / 180);
        const x2 = centerX + radius * Math.cos(Math.PI * endAngle / 180);
        const y2 = centerY + radius * Math.sin(Math.PI * endAngle / 180);
        const pathData = `M ${centerX},${centerY} L ${x1},${y1} A ${radius},${radius} 0 ${largeArc},1 ${x2},${y2} Z`;
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', pathData);
        path.setAttribute('fill', seg.color);
        const textAngle = (startAngle + endAngle) / 2;  
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
         
const labelLength = seg.label.length;
let textOffsetX = 0;
let textOffsetY = 0;
 
 const labelRadius = radius * 0.6; 
const textX = centerX + labelRadius * Math.cos(Math.PI * textAngle / 180) + textOffsetX;
const textY = centerY + labelRadius * Math.sin(Math.PI * textAngle / 180) - textOffsetY;
        
         
         
 
         let displayLabel = seg.label;
if (segments.length >= 9 && displayLabel.length > 4) {
  displayLabel = displayLabel.slice(0, 4) + '…';
}
 
const lines = displayLabel.length > 8
  ? [displayLabel.slice(0, 7), displayLabel.slice(7)]
  : [displayLabel];
 
lines.forEach((line, idx) => {
  const tspan = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
  tspan.setAttribute('x', textX);
  tspan.setAttribute('dy', idx === 0 ? '0' : '1em');
  tspan.textContent = line;
  text.appendChild(tspan);
});
         
        text.setAttribute('x', textX);
        text.setAttribute('y', textY);
        text.setAttribute('text-anchor', 'middle');
         text.setAttribute('font-family', 'Arial, sans-serif');
         text.setAttribute('font-weight', 'bold');       
        text.setAttribute('dominant-baseline', 'middle');
        text.setAttribute('transform', `rotate(${textAngle}, ${textX}, ${textY})`);
 
 
        svg.appendChild(path);
        svg.appendChild(text);
      });
    }
    function rotateWheel() {
      angle += speed;
      svg.style.transform = `rotate(${angle}deg)`;
       
       
if (!isSpinning && speed > 0.01) {
  // 減速中
  speed *= 0.98;
} else if (!isSpinning) {
  // 完全停止
  cancelAnimationFrame(animationFrame);
 
  // 自動停止タイマー掃除
  if (autoStopTimer) {
    clearTimeout(autoStopTimer);
    autoStopTimer = null;
  }
 
  // 減速完了 → 二度押し解禁
  isStopping = false;
  toggleButton.disabled = false;
  toggleButton.textContent = 'スタート';
 
  showResult();
  return;
}
 
      animationFrame = requestAnimationFrame(rotateWheel);
    }
     
 
     function scheduleAutoStop() {
  // 自動停止までのランダム時間（1.5〜5秒）
  const minMs = 6000;
  const maxMs = 8000;
  const ms = Math.floor(Math.random() * (maxMs - minMs) + minMs);
 
  // 既存タイマーがあればクリア
  if (autoStopTimer) {
    clearTimeout(autoStopTimer);
    autoStopTimer = null;
  }
 
  autoStopTimer = setTimeout(() => {
    requestStop(); // 自動で停止要求
  }, ms);
}
 
// 「停止して！」の要求（手動・自動どちらからも呼べる）
function requestStop() {
  if (!isSpinning || isStopping) return; // 既に止め中なら無視
  isStopping = true;
 
  // 減速開始：ボタンは無効化して二度押しを防止
  toggleButton.disabled = true;
  toggleButton.textContent = '停止中';
 
  // 停止処理は rotateWheel 内の減速ロジックに任せる
  isSpinning = false;
}
 
     
     
     
function toggleRotation() {
  initializeSE();
 
  // 減速中は二度押し禁止
  if (isStopping) return;
 
  if (!isSpinning) {
    // スタート（回転開始）
    if (seEnabled && rollAudio) {
      rollAudio.currentTime = 0;
      rollAudio.play().catch(e => console.warn('Roll sound error:', e));
    }
 
    // 念のため古いタイマーを掃除
    if (autoStopTimer) {
      clearTimeout(autoStopTimer);
      autoStopTimer = null;
    }
 
    isSpinning = true;
    speed = 10;
    toggleButton.disabled = false;      // 回っている間は押せる（=押したら手動停止）
    toggleButton.textContent = 'ストップ';
    rotateWheel();
 
    // ランダムで自動停止
    scheduleAutoStop();
  } else {
    // すでに回転中 → 手動で停止要求
    requestStop();
  }
}
 
 
function showResult() {
  const anglePerSegment = 360 / segments.length;
  const normalizedAngle = (360 - (angle % 360) - 90 + 360) % 360;
  const segmentIndex = Math.floor(normalizedAngle / anglePerSegment) % segments.length;
  const selected = segments[segmentIndex];
 
  resultBoard.textContent = selected.label;
  resultBoard.style.background = selected.color;
  resultOverlay.classList.add('show');
  resultOverlay.style.display = 'flex';
 
  playSE();
 
  history.unshift(`${new Date().toLocaleString()} - ${selected.label}`);
  localStorage.setItem('history', JSON.stringify(history));
 
  const consumeOnce = document.getElementById('consume-once-toggle').checked;
  if (consumeOnce) {
    segments.splice(segmentIndex, 1);
    localStorage.setItem('segments', JSON.stringify(segments));
    drawWheel();
 
    if (segments.length === 0) {
  toggleButton.disabled = true;
  toggleButton.textContent = '終了';
    }
  }
}
 
 
    function hideResult() {
      resultOverlay.classList.remove('show');
      setTimeout(() => resultOverlay.style.display = 'none', 300);
    }
    function toggleSettings() {
      document.getElementById('settings-panel').classList.toggle('show');
    }
function openInputPanel(forceOpen = false) {
  const inputArea = document.getElementById('input-area');
  const controls = document.querySelector('.input-controls');
 
  if (!forceOpen && inputArea.style.display === 'block') {
    inputArea.style.display = 'none';
    if (controls) controls.style.display = 'none';
    return;
  }
 
  inputArea.style.display = 'block';
  if (controls) controls.style.display = 'flex';
  inputArea.innerHTML = '';
  segments.forEach((seg, i) => {
    const div = document.createElement('div');
    div.className = 'input-field';
    const colorBox = document.createElement('div');
    colorBox.className = 'color-box';
    colorBox.style.background = seg.color;
    const input = document.createElement('input');
    input.maxLength = 20;
    input.value = seg.label;
    input.dataset.index = i;
    div.appendChild(colorBox);
    div.appendChild(input);
 
     const removeBtn = document.createElement('button');
removeBtn.className = 'button is-small is-light has-text-grey';
removeBtn.textContent = '✖';
removeBtn.onclick = () => {
  segments.splice(i, 1);
  openInputPanel(true);
};
div.appendChild(removeBtn);
     
    inputArea.appendChild(div);
  });
}
 
 
    function addInputField() {
      if (segments.length >= 50) return;
      segments.push({ label: `項目${segments.length + 1}`, color: getRandomPastel() });
      openInputPanel(true);
    }
  function removeInputField() {
  if (segments.length <= 1) return;
  segments.pop();
  openInputPanel(true);
}
 
    function saveInput() {
      const inputs = document.querySelectorAll('#input-area input');
      inputs.forEach(input => {
        const index = parseInt(input.dataset.index);
        segments[index].label = input.value;
      });
      localStorage.setItem('segments', JSON.stringify(segments));
      drawWheel();
       
         if (segments.length > 0) {
    toggleButton.disabled = false;
    toggleButton.textContent = 'スタート';
  }
         const inputArea = document.getElementById('input-area');
  const controls = document.querySelector('.input-controls');
  if (inputArea) inputArea.style.display = 'none';
  if (controls) controls.style.display = 'none';
    }
function showHistory() {
  const historyArea = document.getElementById('history-area');
 
  if (historyArea.style.display === 'block' || historyArea.style.display === '') {
    historyArea.style.display = 'none';
  } else {
    historyArea.textContent = history.join('\n');
    historyArea.style.display = 'block';
  }
}
 
     function clearHistoryOnly() {
  history = [];
  localStorage.setItem('history', JSON.stringify(history));
  const historyArea = document.getElementById('history-area');
  historyArea.textContent = '';
}
 
 
    function resetStorage() {
      localStorage.clear();
      history = [];
      segments = [];
      location.reload();
    }
    function getRandomPastel() {
      const r = Math.floor((Math.random() * 128) + 127);
      const g = Math.floor((Math.random() * 128) + 127);
      const b = Math.floor((Math.random() * 128) + 127);
      return `rgb(${r}, ${g}, ${b})`;
    }
    drawWheel();
  </script>
</body>
